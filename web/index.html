<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rustcode Remote</title>
    <style>
        body { font-family: system-ui, -apple-system, sans-serif; background: #121212; color: #e0e0e0; margin: 0; display: flex; justify-content: center; }
        #app { width: 100%; max-width: 600px; padding: 20px; box-sizing: border-box; }
        .hidden { display: none !important; }
        
        /* Token Screen */
        #token-screen { text-align: center; margin-top: 100px; }
        input { padding: 12px; font-size: 16px; border-radius: 8px; border: 1px solid #444; background: #222; color: white; width: 100%; max-width: 300px; }
        button { padding: 12px 24px; font-size: 16px; cursor: pointer; border-radius: 8px; border: none; background: #007AFF; color: white; font-weight: bold; margin-top: 10px; }
        
        /* Chat View */
        #chat-view { display: flex; flex-direction: column; gap: 15px; }
        .msg { padding: 12px; border-radius: 12px; max-width: 85%; line-height: 1.5; word-wrap: break-word; }
        .user { background: #007AFF; color: white; align-self: flex-end; }
        .assistant { background: #333; color: #e0e0e0; align-self: flex-start; }
        .tool, .system { background: #1a1a1a; color: #888; font-family: monospace; font-size: 12px; align-self: flex-start; }
        
        /* Modal */
        #modal-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.85); display: flex; justify-content: center; align-items: center; z-index: 1000; }
        #modal { background: #222; padding: 24px; border-radius: 16px; width: 90%; max-width: 450px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        #modal h2 { margin-top: 0; color: #fff; }
        .preview { background: #111; padding: 12px; border-radius: 8px; font-family: monospace; white-space: pre-wrap; overflow-x: auto; margin: 15px 0; font-size: 13px; color: #bbb; }
        .btn-group { display: flex; gap: 12px; justify-content: flex-end; }
        .btn-reject { background: #ff4444; }
    </style>
</head>
<body>
    <div id="app">
        <!-- Token Entry -->
        <div id="token-screen">
            <h1>Rustcode Remote</h1>
            <p>Enter session token to connect</p>
            <input type="text" id="token-input" placeholder="Session Token">
            <br>
            <button onclick="connect()">Connect</button>
        </div>

        <!-- Chat Dashboard -->
        <div id="dashboard" class="hidden">
            <h2>Conversation</h2>
            <div id="chat-view"></div>
            <div id="composer" style="position:sticky;bottom:0;display:flex;gap:8px;padding:10px 0;background:#121212;">
              <input id="chat-input" placeholder="Message…" style="flex:1;max-width:none;">
              <button onclick="send()">Send</button>
              <button id="cancel-btn" style="background:#ff4444;" onclick="cancelAgent()">Cancel</button>
            </div>
        </div>
    </div>

    <!-- Confirmation Modal -->
    <div id="modal-overlay" class="hidden">
        <div id="modal">
            <h2 id="modal-title">Confirm Tool</h2>
            <p id="modal-desc">The agent wants to execute a tool.</p>
            <div id="modal-preview" class="preview"></div>
            <div class="btn-group">
                <button class="btn-reject" onclick="respond(false)">Reject</button>
                <button onclick="respond(true)">Accept</button>
            </div>
        </div>
    </div>

    <script>
        let sessionToken = '';
        let pollingInterval = null;

        async function connect() {
            const input = document.getElementById('token-input');
            sessionToken = input.value.trim();
            if (!sessionToken) return alert('Please enter a token');

            try {
                // Test the connection
                await fetch(`/api/history?token=${sessionToken}`);
                document.getElementById('token-screen').classList.add('hidden');
                document.getElementById('dashboard').classList.remove('hidden');
                startPolling();
            } catch (e) {
                alert('Invalid token or server unreachable');
            }
        }

        async function startPolling() {
            pollingInterval = setInterval(async () => {
                await refreshHistory();
                await checkStatus();
            }, 2000);
        }

        async function refreshHistory() {
            const res = await fetch(`/api/history?token=${sessionToken}`);
            if (res.ok) {
                const data = await res.json();
                const view = document.getElementById('chat-view');
                view.innerHTML = '';
                data.history.forEach(m => {
                    const div = document.createElement('div');
                    div.className = `msg ${m.role}`;
                    div.innerText = m.content;
                    view.appendChild(div);
                });
                view.scrollTop = view.scrollHeight;
            }
        }

        async function send() {
            const el = document.getElementById('chat-input');
            const message = el.value.trim();
            if (!message) return;
            el.value = '';
            await fetch('/api/send', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: sessionToken, message })
            });
            await refreshHistory();
        }

        async function cancelAgent() {
            await fetch('/api/cancel', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: sessionToken })
            });
            await refreshHistory();
        }

        document.addEventListener('keydown', e => {
            if (e.key === 'Enter' && document.activeElement.id === 'chat-input') send();
        });

        async function checkStatus() {
            const res = await fetch(`/api/status?token=${sessionToken}`);
            if (res.ok) {
                const data = await res.json();
                if (data.confirmation) {
                    document.getElementById('modal-overlay').classList.remove('hidden');
                    document.getElementById('modal-title').innerText = `Confirm: ${data.confirmation.tool}`;
                    document.getElementById('modal-preview').innerText = data.confirmation.preview + '\n(Size: ' + data.confirmation.bytes + ' bytes)';
                } else {
                    document.getElementById('modal-overlay').classList.add('hidden');
                }
            }
        }

        async function respond(approved) {
            await fetch('/api/confirm', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token: sessionToken, approved: approved })
            });
            document.getElementById('modal-overlay').classList.add('hidden');
        }
    </script>
</body>
</html>
